<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RCM AutoMed \u2014 Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #07080a;
    --bg2:       #0d0f12;
    --bg3:       #131619;
    --border:    #1e2228;
    --border2:   #262b33;
    --text:      #e8eaed;
    --text2:     #8a919e;
    --text3:     #4d5562;
    --green:     #00e5a0;
    --green-d:   #00a370;
    --green-bg:  rgba(0,229,160,0.06);
    --red:       #ff4d6d;
    --red-bg:    rgba(255,77,109,0.06);
    --amber:     #ffb930;
    --amber-bg:  rgba(255,185,48,0.06);
    --blue:      #4d9fff;
    --blue-bg:   rgba(77,159,255,0.06);
    --purple:    #b57aff;
    --purple-bg: rgba(181,122,255,0.06);
    --teal: #00d4d4;
    --teal-bg: rgba(0,212,212,0.06);
    --font-head: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* \u2500\u2500\u2500 GRID NOISE OVERLAY \u2500\u2500\u2500 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* \u2500\u2500\u2500 LAYOUT \u2500\u2500\u2500 */
  .shell {
    display: grid;
    grid-template-columns: 220px 1fr;
    grid-template-rows: 56px 1fr;
    min-height: 100vh;
    position: relative;
    z-index: 1;
  }

  /* \u2500\u2500\u2500 TOPBAR \u2500\u2500\u2500 */
  .topbar {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    border-bottom: 1px solid var(--border);
    background: rgba(7,8,10,0.95);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--font-head);
    font-weight: 800;
    font-size: 16px;
    letter-spacing: -0.02em;
  }

  .logo-mark {
    width: 28px; height: 28px;
    background: var(--green);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 800; color: #000;
  }

  .logo-sub { color: var(--text2); font-weight: 400; font-size: 12px; margin-left: 2px; }

  .topbar-right {
    display: flex; align-items: center; gap: 20px;
  }

  .status-pill {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; font-family: var(--font-mono);
    color: var(--green); background: var(--green-bg);
    padding: 4px 10px; border-radius: 20px;
    border: 1px solid rgba(0,229,160,0.2);
  }

  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .topbar-time {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text3);
  }

  /* \u2500\u2500\u2500 SIDEBAR \u2500\u2500\u2500 */
  .sidebar {
    border-right: 1px solid var(--border);
    padding: 24px 0;
    background: var(--bg2);
    display: flex;
    flex-direction: column;
    gap: 2px;
    position: sticky;
    top: 56px;
    height: calc(100vh - 56px);
    overflow-y: auto;
  }

  .nav-section {
    padding: 0 16px;
    margin-bottom: 8px;
  }

  .nav-label {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.12em;
    color: var(--text3);
    text-transform: uppercase;
    padding: 0 8px;
    margin-bottom: 4px;
    margin-top: 16px;
  }

  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 13px;
    color: var(--text2);
    border: 1px solid transparent;
    position: relative;
  }

  .nav-item:hover { background: var(--bg3); color: var(--text); }

  .nav-item.active {
    background: var(--green-bg);
    color: var(--green);
    border-color: rgba(0,229,160,0.15);
  }

  .nav-item .nav-icon { font-size: 15px; width: 18px; text-align: center; }

  .nav-badge {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 10px;
    background: var(--red-bg);
    color: var(--red);
    border: 1px solid rgba(255,77,109,0.2);
  }

  .nav-badge.green {
    background: var(--green-bg);
    color: var(--green);
    border-color: rgba(0,229,160,0.2);
  }

  /* \u2500\u2500\u2500 MAIN CONTENT \u2500\u2500\u2500 */
  .main {
    padding: 28px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  /* \u2500\u2500\u2500 PAGE HEADER \u2500\u2500\u2500 */
  .page-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    opacity: 0; transform: translateY(12px);
    animation: fadeUp 0.5s ease forwards;
  }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .page-title {
    font-family: var(--font-head);
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.1;
  }

  .page-title span { color: var(--green); }

  .page-sub {
    color: var(--text2);
    font-size: 13px;
    margin-top: 4px;
  }

  .btn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 9px 18px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
    font-family: var(--font-body);
  }

  .btn-primary {
    background: var(--green);
    color: #000;
  }
  .btn-primary:hover { background: #00f0aa; transform: translateY(-1px); }

  .btn-ghost {
    background: transparent;
    color: var(--text2);
    border: 1px solid var(--border2);
  }
  .btn-ghost:hover { border-color: var(--border2); color: var(--text); background: var(--bg3); }

  /* \u2500\u2500\u2500 KPI ROW \u2500\u2500\u2500 */
  .kpi-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    opacity: 0;
    animation: fadeUp 0.5s ease 0.1s forwards;
  }

  .kpi-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .kpi-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent, var(--green));
  }

  .kpi-card:hover { border-color: var(--border2); }

  .kpi-label {
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--text3);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .kpi-value {
    font-family: var(--font-head);
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1;
    color: var(--accent, var(--green));
  }

  .kpi-delta {
    margin-top: 8px;
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--text2);
    display: flex; align-items: center; gap: 4px;
  }

  .kpi-delta.up { color: var(--green); }
  .kpi-delta.down { color: var(--red); }

  /* \u2500\u2500\u2500 TWO COLUMN GRID \u2500\u2500\u2500 */
  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    opacity: 0;
    animation: fadeUp 0.5s ease 0.2s forwards;
  }

  .three-col {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    opacity: 0;
    animation: fadeUp 0.5s ease 0.25s forwards;
  }

  /* \u2500\u2500\u2500 PANEL \u2500\u2500\u2500 */
  .panel {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .panel-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }

  .panel-title {
    font-family: var(--font-head);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.01em;
    display: flex; align-items: center; gap: 8px;
  }

  .panel-badge {
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    background: var(--green-bg);
    color: var(--green);
    border: 1px solid rgba(0,229,160,0.2);
  }

  .panel-badge.amber {
    background: var(--amber-bg); color: var(--amber);
    border-color: rgba(255,185,48,0.2);
  }

  .panel-badge.red {
    background: var(--red-bg); color: var(--red);
    border-color: rgba(255,77,109,0.2);
  }

  .panel-body { padding: 20px; }

  /* \u2500\u2500\u2500 BOT STATUS CARDS \u2500\u2500\u2500 */
  .bot-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    opacity: 0;
    animation: fadeUp 0.5s ease 0.15s forwards;
  }

  .bot-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.2s;
  }

  .bot-card:hover {
    border-color: var(--bot-color, var(--green));
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }

  .bot-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 60px;
    background: linear-gradient(transparent, rgba(0,0,0,0.3));
  }

  .bot-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }

  .bot-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    background: var(--bot-bg, var(--green-bg));
    border: 1px solid var(--bot-border, rgba(0,229,160,0.2));
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  .bot-status {
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 10px;
    display: flex; align-items: center; gap: 5px;
  }

  .bot-status.live {
    background: var(--green-bg);
    color: var(--green);
    border: 1px solid rgba(0,229,160,0.2);
  }

  .bot-status.building {
    background: var(--amber-bg);
    color: var(--amber);
    border: 1px solid rgba(255,185,48,0.2);
  }

  .bot-name {
    font-family: var(--font-head);
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 4px;
  }

  .bot-desc {
    font-size: 12px;
    color: var(--text2);
    line-height: 1.5;
    margin-bottom: 16px;
  }

  .bot-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .bot-stat {
    background: var(--bg3);
    border-radius: 8px;
    padding: 10px 12px;
  }

  .bot-stat-val {
    font-family: var(--font-mono);
    font-size: 16px;
    font-weight: 500;
    color: var(--bot-color, var(--green));
  }

  .bot-stat-label {
    font-size: 10px;
    color: var(--text3);
    margin-top: 2px;
  }

  /* \u2500\u2500\u2500 ACTIVITY FEED \u2500\u2500\u2500 */
  .feed { display: flex; flex-direction: column; }

  .feed-item {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  .feed-item:last-child { border-bottom: none; }
  .feed-item:hover { background: var(--bg3); }

  .feed-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-top: 5px;
    flex-shrink: 0;
  }

  .feed-content { flex: 1; min-width: 0; }

  .feed-title {
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .feed-meta {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text3);
    margin-top: 2px;
  }

  .feed-amount {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text2);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .feed-amount.green { color: var(--green); }
  .feed-amount.red { color: var(--red); }

  /* \u2500\u2500\u2500 DENIAL BREAKDOWN \u2500\u2500\u2500 */
  .denial-list { display: flex; flex-direction: column; gap: 10px; }

  .denial-row {
    display: flex; align-items: center; gap: 12px;
  }

  .denial-label {
    font-size: 12px;
    color: var(--text2);
    width: 160px;
    flex-shrink: 0;
  }

  .denial-bar-wrap {
    flex: 1;
    height: 6px;
    background: var(--bg3);
    border-radius: 3px;
    overflow: hidden;
  }

  .denial-bar {
    height: 100%;
    border-radius: 3px;
    transition: width 1s ease;
  }

  .denial-count {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text2);
    width: 30px;
    text-align: right;
  }

  .denial-pct {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text3);
    width: 36px;
    text-align: right;
  }

  /* \u2500\u2500\u2500 LIVE DEMO SECTION \u2500\u2500\u2500 */
  .demo-section {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    opacity: 0;
    animation: fadeUp 0.5s ease 0.3s forwards;
  }

  .demo-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }

  .demo-tab {
    padding: 12px 20px;
    font-size: 13px;
    color: var(--text3);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    font-family: var(--font-mono);
    letter-spacing: 0.02em;
  }

  .demo-tab:hover { color: var(--text2); }
  .demo-tab.active { color: var(--green); border-bottom-color: var(--green); }

  .demo-panel { display: none; padding: 24px; }
  .demo-panel.active { display: block; }

  .demo-form {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }

  .form-group { display: flex; flex-direction: column; gap: 6px; }

  .form-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--text3);
    text-transform: uppercase;
  }

  .form-input {
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 13px;
    color: var(--text);
    font-family: var(--font-body);
    transition: border-color 0.15s;
    outline: none;
  }

  .form-input:focus { border-color: var(--green); }
  .form-input::placeholder { color: var(--text3); }

  .demo-result {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    font-family: var(--font-mono);
    font-size: 12px;
    line-height: 1.8;
    min-height: 160px;
    position: relative;
  }

  .result-line { display: flex; gap: 12px; align-items: flex-start; }
  .result-key { color: var(--text3); min-width: 160px; }
  .result-val { color: var(--text); }
  .result-val.green { color: var(--green); }
  .result-val.red { color: var(--red); }
  .result-val.amber { color: var(--amber); }

  .result-badge {
    display: inline-flex; align-items: center;
    padding: 2px 8px; border-radius: 6px;
    font-size: 10px;
  }

  /* \u2500\u2500\u2500 REVENUE CHART \u2500\u2500\u2500 */
  .chart-wrap {
    position: relative;
    height: 160px;
    padding: 10px 0;
  }

  .chart-svg;t-svg { width: 100%; height: 100%; }

  /* \u2500\u2500\u2500 ROI CALCULATOR \u2500\u2500\u2500 */
  .roi-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    align-items: center;
  }

  .roi-input-group {
    display: flex; flex-direction: column; gap: 12px;
  }

  .roi-slider-wrap { display: flex; flex-direction: column; gap: 6px; }

  .roi-slider-label {
    display: flex; justify-content: space-between;
    font-size: 12px; color: var(--text2);
  }

  .roi-slider-label span {
    font-family: var(--font-mono);
    color: var(--green);
  }

  input[type=range] {
    width: 100%;
    accent-color: var(--green);
    height: 4px;
    cursor: pointer;
  }

  .roi-result {
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 24px;
    text-align: center;
  }

  .roi-big {
    font-family: var(--font-head);
    font-size: 48px;
    font-weight: 800;
    color: var(--green);
    letter-spacing: -0.04em;
    line-height: 1;
    margin-bottom: 4px;
  }

  .roi-label { font-size: 12px; color: var(--text2); margin-bottom: 20px; }

  .roi-breakdown {
    display: flex; flex-direction: column; gap: 8px;
    text-align: left;
  }

  .roi-item {
    display: flex; justify-content: space-between;
    font-size: 12px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }

  .roi-item:last-child { border-bottom: none; }
  .roi-item-label { color: var(---text2); }
  
  
  
